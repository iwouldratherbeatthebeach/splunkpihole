[Pi-hole - No query data]
description = Detect when normalized Pi-hole query events stop arriving.
search = | tstats count where index=pihole sourcetype=pihole:query:json earliest=-10m | where count=0
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4

[Pi-hole - Collector errors]
description = Detect Pi-hole API collector failures.
search = index=pihole event_type=collector_error earliest=-10m | stats count values(error) as errors by host collector | rename host as pihole_node | where count>0
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.severity = 3

[Pi-hole - Blocking disabled]
description = Detect when Pi-hole blocking is not enabled.
search = `pihole_metrics` metric_name=blocking earliest=-10m | spath path=data.blocking output=blocking | stats latest(blocking) as blocking latest(_time) as last_seen by host | rename host as pihole_node | where blocking!="enabled"
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5

[Pi-hole - Client query volume anomaly]
description = Detect a client whose five-minute query volume is more than four standard deviations above its recent baseline.
search = `pihole_queries` earliest=-24h | bin _time span=5m | stats count as queries by _time host src | eventstats avg(queries) as avg_queries stdev(queries) as sd_queries by host src | eval zscore=if(sd_queries>0,(queries-avg_queries)/sd_queries,0) | where _time>=relative_time(now(),"-10m") AND zscore>=4 AND queries>=100 | rename host as pihole_node | sort - zscore
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.severity = 3

[Pi-hole - NXDOMAIN spike]
description = Detect a significant increase in NXDOMAIN replies.
search = `pihole_queries` earliest=-6h reply_code=NXDOMAIN | timechart span=5m count as nxdomain | eventstats avg(nxdomain) as avg stdev(nxdomain) as sd | eval zscore=if(sd>0,(nxdomain-avg)/sd,0) | where _time>=relative_time(now(),"-10m") AND zscore>=4 AND nxdomain>=50
dispatch.earliest_time = -6h
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 0
alert_type = number of results
alert_comparator = greater than
alert_threshold = 0
alert.severity = 3
