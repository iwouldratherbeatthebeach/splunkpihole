[pihole_dns_query]
search = `pihole_queries`
description = Normalized Pi-hole DNS query

[pihole_dns_blocked]
search = `pihole_queries` action=blocked
description = DNS query blocked by Pi-hole

[pihole_dns_allowed]
search = `pihole_queries` action=allowed
description = DNS query allowed by Pi-hole

[pihole_collector_error]
search = index=pihole event_type=collector_error
description = Pi-hole scripted input failure
