[pihole:query:json]
INDEXED_EXTRACTIONS = json
KV_MODE = none
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TRUNCATE = 200000
TIMESTAMP_FIELDS = event_time
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
category = Structured
description = Normalized Pi-hole v6 query API events

[pihole:metric:json]
INDEXED_EXTRACTIONS = json
KV_MODE = none
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TRUNCATE = 500000
TIMESTAMP_FIELDS = event_time
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
category = Structured
description = Pi-hole v6 health and statistics API events

[pihole:dns]
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 20
TIME_FORMAT = %b %d %H:%M:%S
EXTRACT-dns_query = query\[(?<query_type>[^\]]+)\]\s+(?<query>\S+)\s+from\s+(?<src>\S+)
EXTRACT-dns_forwarded = forwarded\s+(?<query>\S+)\s+to\s+(?<dest>\S+)
EXTRACT-dns_reply = reply\s+(?<query>\S+)\s+is\s+(?<reply_value>\S+)
EXTRACT-dns_blocked = (?<action>gravity blocked|regex blocked|exactly denied|config blocked)\s+(?<query>\S+)
EVAL-vendor_product = "Pi-hole"
EVAL-event_category = "dns_raw"

[pihole:ftl]
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 32
TIME_FORMAT = %Y-%m-%d %H:%M:%S
EXTRACT-log_level = \[(?<log_level>[A-Z]+)\]
EVAL-vendor_product = "Pi-hole FTL"
EVAL-event_category = "service"

[pihole:web]
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 32
EVAL-vendor_product = "Pi-hole Webserver"
EVAL-event_category = "web"
