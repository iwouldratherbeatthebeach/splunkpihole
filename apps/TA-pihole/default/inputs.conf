# Inputs are disabled here. Enable them in a deployment/site app.

[monitor:///var/log/pihole/pihole.log]
disabled = 1
index = pihole
sourcetype = pihole:dns

[monitor:///var/log/pihole/FTL.log]
disabled = 1
index = pihole
sourcetype = pihole:ftl

[monitor:///var/log/pihole/webserver.log]
disabled = 1
index = pihole
sourcetype = pihole:web

[script://./bin/pihole_queries.py]
disabled = 1
interval = 30
index = pihole
sourcetype = pihole:query:json

[script://./bin/pihole_metrics.py]
disabled = 1
interval = 60
index = pihole
sourcetype = pihole:metric:json
